<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SportsSwap</title>

<style>
body{font-family:Arial;background:#F7FAFF;margin:0}
header{background:#fff;padding:16px;display:flex;justify-content:space-between;border-bottom:1px solid #E3E8F0}
.brand{font-size:24px;font-weight:800}.brand span{color:#4DA6FF}
nav button{margin:4px;padding:8px 12px;border-radius:10px;border:none;background:#EEF6FF;color:#2F80ED;font-weight:700;cursor:pointer}
.hero{background:linear-gradient(135deg,#2F80ED,#4DA6FF);color:#fff;padding:40px;text-align:center}
.wrap{max-width:1100px;margin:auto;padding:20px}
.section{display:none}.active{display:block}

.card img{
  width:100%;
  height:320px;
  object-fit:contain;
  background:#F3F6FB;
  padding:12px;
}

.panel{background:#fff;padding:16px;border-radius:12px;margin-bottom:16px}
input,select,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid #ddd;margin-bottom:10px}
button{padding:10px;border:none;border-radius:10px;font-weight:700;cursor:pointer}
.btn-primary{background:#4DA6FF;color:#fff}

.preview{width:100%;max-height:200px;display:none;border-radius:10px;margin-top:10px}
</style>
</head>

<body>

<header>
<div class="brand">Sports<span>Swap</span></div>
<nav>
<button onclick="showSection('shop')">Shop</button>
<button onclick="showSection('sell')">Sell</button>
<button onclick="showSection('account')">Account</button>
</nav>
</header>

<div class="hero">
<h1>Buy and sell sports gear safely</h1>
</div>

<div class="wrap">

<!-- SHOP -->
<div id="shop" class="section active">
<h2>Shop</h2>
<div id="listings"></div>
</div>

<!-- SELL -->
<div id="sell" class="section">
<h2>Sell Item</h2>

<select id="sport"></select>
<select id="gear"></select>

<input id="title" placeholder="Item title">
<input id="price" placeholder="Price">

<textarea id="desc" placeholder="Description"></textarea>

<input type="file" id="imageFile">
<img id="preview" class="preview">

<button class="btn-primary" onclick="createListing()">Post</button>
</div>

<!-- ACCOUNT -->
<div id="account" class="section">

<h2>Account</h2>

<input id="email" placeholder="Email">
<input id="password" placeholder="Password">

<button onclick="signUp()">Sign Up</button>
<button onclick="signIn()">Sign In</button>

<h3>Profile</h3>

<input id="username" placeholder="Username">
<input type="file" id="profileFile">
<img id="profilePreview" class="preview">
<textarea id="bio" placeholder="Bio"></textarea>

<button onclick="saveProfile()">Save Profile</button>

</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword,onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-storage.js";

const app=initializeApp({
apiKey:"YOUR KEY",
authDomain:"YOUR DOMAIN",
projectId:"YOUR ID",
storageBucket:"YOUR BUCKET"
});

const auth=getAuth(app);
const db=getFirestore(app);
const storage=getStorage(app);

let user=null;

onAuthStateChanged(auth,u=>{user=u;loadProfile();});

window.showSection=id=>{
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

const sports={
Hockey:["Stick","Skates","Gloves"],
Baseball:["Bat","Glove","Helmet"],
Golf:["Clubs","Bag"]
};

const sportSelect=document.getElementById('sport');
const gearSelect=document.getElementById('gear');

Object.keys(sports).forEach(s=>{
let o=document.createElement('option');
o.textContent=s;
sportSelect.appendChild(o);
});

sportSelect.onchange=()=>{
gearSelect.innerHTML="";
sports[sportSelect.value].forEach(g=>{
let o=document.createElement('option');
o.textContent=g;
gearSelect.appendChild(o);
});
};

sportSelect.onchange();

document.getElementById('imageFile').onchange=e=>{
let file=e.target.files[0];
let p=document.getElementById('preview');
p.src=URL.createObjectURL(file);
p.style.display='block';
};

window.createListing=async()=>{
let file=document.getElementById('imageFile').files[0];
let img="";

if(file){
let r=ref(storage,'img/'+Date.now());
await uploadBytes(r,file);
img=await getDownloadURL(r);
}

await addDoc(collection(db,'listings'),{
title:title.value,
price:price.value,
desc:desc.value,
sport:sport.value,
gear:gear.value,
image:img
});
};

onSnapshot(collection(db,'listings'),snap=>{
let html="";
snap.forEach(d=>{
let i=d.data();
html+=`
<div class="panel card">
<img src="${i.image}">
<h3>${i.title}</h3>
<p>${i.sport} • ${i.gear}</p>
<p>$${i.price}</p>
</div>`;
});
listings.innerHTML=html;
});

window.signUp=()=>createUserWithEmailAndPassword(auth,email.value,password.value);
window.signIn=()=>signInWithEmailAndPassword(auth,email.value,password.value);

window.saveProfile=async()=>{
let file=document.getElementById('profileFile').files[0];
let img="";

if(file){
let r=ref(storage,'profile/'+user.uid);
await uploadBytes(r,file);
img=await getDownloadURL(r);
}

await setDoc(doc(db,'users',user.uid),{
username:username.value,
bio:bio.value,
image:img
});
};

async function loadProfile(){
if(!user)return;
let s=await getDoc(doc(db,'users',user.uid));
if(!s.exists())return;
let d=s.data();
username.value=d.username||"";
bio.value=d.bio||"";
if(d.image){
profilePreview.src=d.image;
profilePreview.style.display="block";
}
}
</script>

</body>
</html>
