<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SportsSwap</title>

<link rel="icon" href="favicon.png">

<style>
body{font-family:Arial;background:#F7FAFF;margin:0}
header{background:#fff;padding:16px;display:flex;justify-content:space-between;border-bottom:1px solid #E3E8F0}
.brand{font-size:24px;font-weight:800}.brand span{color:#4DA6FF}
nav button{margin:4px;padding:8px 12px;border-radius:10px;border:none;background:#EEF6FF;color:#2F80ED;font-weight:700;cursor:pointer}

.section{display:none}
.active{display:block}

.wrap{max-width:1100px;margin:auto;padding:20px}

/* HERO */
.hero{background:#F7FAFF;padding:30px}

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:16px}

.card img{width:100%;height:300px;object-fit:contain;background:#F3F6FB;padding:10px}

.panel{background:#fff;padding:16px;border-radius:12px;margin-bottom:16px}

input,select,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid #ddd;margin-bottom:10px}

.preview{width:100%;max-height:200px;display:none}
</style>
</head>

<body>

<header>
<div class="brand">Sports<span>Swap</span></div>
<nav>
<button onclick="show('home')">Shop</button>
<button onclick="show('sell')">Sell</button>
<button onclick="show('account')">Account</button>
</nav>
</header>

<!-- HOME -->
<div id="home" class="section active">
<div class="hero wrap">

<input placeholder="Search gear..." style="padding:14px;border-radius:12px;border:1px solid #ccc;margin-bottom:20px">

<div style="display:flex;gap:10px;margin-bottom:20px;">
<button style="background:#2F80ED;color:white;border:none;border-radius:999px;padding:8px 14px;">Hockey</button>
<button style="border:none;border-radius:999px;padding:8px 14px;">Baseball</button>
<button style="border:none;border-radius:999px;padding:8px 14px;">Golf</button>
</div>

<h1>Discover the best deals in sports gear</h1>
<p style="color:#666">Thousands of listings daily.</p>

<div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:20px;">

<div style="position:relative;border-radius:16px;overflow:hidden;">
<img src="https://images.unsplash.com/photo-1517649763962-0c623066013b">
<div style="position:absolute;bottom:20px;left:20px;color:white;">
<h2>Gear up. Save big.</h2>
</div>
</div>

<div style="position:relative;border-radius:16px;overflow:hidden;">
<img src="https://images.unsplash.com/photo-1579952363873-27d3bfad9c0d">
<div style="position:absolute;bottom:20px;left:20px;color:white;">
<h2>Turn gear into cash</h2>
</div>
</div>

</div>

<div id="listings" class="grid" style="margin-top:30px;"></div>

</div>
</div>

<!-- SELL -->
<div id="sell" class="section wrap">
<div class="panel">

<select id="sport"></select>
<select id="gear"></select>

<input id="title" placeholder="Title">
<input id="price" placeholder="Price">

<textarea id="desc"></textarea>

<input type="file" id="img">
<img id="preview" class="preview">

<button onclick="create()">Post</button>

</div>
</div>

<!-- ACCOUNT -->
<div id="account" class="section wrap">
<div class="panel">

<input id="email" placeholder="Email">
<input id="password" placeholder="Password">

<button onclick="signup()">Sign Up</button>
<button onclick="signin()">Sign In</button>

<h3>Profile</h3>

<input id="username" placeholder="Username">
<input type="file" id="pimg">
<img id="ppreview" class="preview">
<textarea id="bio"></textarea>

<button onclick="saveProfile()">Save</button>

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth,createUserWithEmailAndPassword,signInWithEmailAndPassword,onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { getFirestore,collection,addDoc,onSnapshot,doc,setDoc,getDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
import { getStorage,ref,uploadBytes,getDownloadURL } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-storage.js";

const app=initializeApp({
apiKey:"AIzaSyAYPsyhHfI2fl0nHGHSX4i1z2e9ZOfDb2I",
authDomain:"sportsswap-32168.firebaseapp.com",
projectId:"sportsswap-32168",
storageBucket:"sportsswap-32168.firebasestorage.app",
messagingSenderId:"338047786786",
appId:"1:338047786786:web:e10d3d719be347ca4f0f7b"
});

const auth=getAuth(app);
const db=getFirestore(app);
const storage=getStorage(app);

let user=null;

onAuthStateChanged(auth,u=>user=u);

window.show=id=>{
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
};

const map={
Hockey:["Stick","Skates","Gloves"],
Baseball:["Bat","Glove"],
Golf:["Clubs"]
};

const s=document.getElementById('sport');
const g=document.getElementById('gear');

Object.keys(map).forEach(x=>{
let o=document.createElement('option');
o.textContent=x;
s.appendChild(o);
});

s.onchange=()=>{
g.innerHTML="";
map[s.value].forEach(x=>{
let o=document.createElement('option');
o.textContent=x;
g.appendChild(o);
});
};
s.onchange();

img.onchange=e=>{
preview.src=URL.createObjectURL(e.target.files[0]);
preview.style.display="block";
};

window.create=async()=>{
let file=img.files[0];
let url="";

if(file){
let r=ref(storage,"img/"+Date.now());
await uploadBytes(r,file);
url=await getDownloadURL(r);
}

await addDoc(collection(db,"listings"),{
title:title.value,
price:price.value,
desc:desc.value,
sport:s.value,
gear:g.value,
image:url
});
};

onSnapshot(collection(db,"listings"),snap=>{
let html="";
snap.forEach(d=>{
let i=d.data();
html+=`
<div class="panel card">
<img src="${i.image}">
<h3>${i.title}</h3>
<p>${i.sport} • ${i.gear}</p>
<p>$${i.price}</p>
</div>`;
});
listings.innerHTML=html;
});

window.signup=()=>createUserWithEmailAndPassword(auth,email.value,password.value);
window.signin=()=>signInWithEmailAndPassword(auth,email.value,password.value);

pimg.onchange=e=>{
ppreview.src=URL.createObjectURL(e.target.files[0]);
ppreview.style.display="block";
};

window.saveProfile=async()=>{
let file=pimg.files[0];
let url="";

if(file){
let r=ref(storage,"profile/"+user.uid);
await uploadBytes(r,file);
url=await getDownloadURL(r);
}

await setDoc(doc(db,"users",user.uid),{
username:username.value,
bio:bio.value,
image:url
});
};
</script>

</body>
</html>
