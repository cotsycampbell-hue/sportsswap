<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SportsSwap</title>

<link rel="icon" href="favicon.png">

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial;background:#F7FAFF;color:#111}

header{
  background:#fff;
  padding:16px 24px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #E3E8F0;
}

.brand{font-size:26px;font-weight:800}
.brand span{color:#4DA6FF}

nav button{
  margin-left:8px;
  padding:8px 14px;
  border-radius:10px;
  border:none;
  background:#EEF6FF;
  color:#2F80ED;
  font-weight:700;
  cursor:pointer;
}

/* NEW HOMEPAGE */
.home{max-width:1100px;margin:auto;padding:24px}

.search input{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:1px solid #DCE6F2;
}

.sports{
  display:flex;
  gap:10px;
  overflow-x:auto;
  margin:20px 0;
}

.sports button{
  padding:8px 14px;
  border-radius:999px;
  border:none;
  background:#EEF6FF;
  color:#2F80ED;
  font-weight:700;
}

.headline h1{font-size:34px;margin-bottom:10px}
.headline p{color:#64748B;margin-bottom:20px}

.features{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  margin-bottom:30px;
}

.card{
  position:relative;
  border-radius:16px;
  overflow:hidden;
}

.card img{
  width:100%;
  height:260px;
  object-fit:cover;
}

.overlay{
  position:absolute;
  bottom:20px;
  left:20px;
  color:#fff;
}

.overlay button{
  margin-top:10px;
  padding:8px 14px;
  border-radius:999px;
  border:none;
  background:#fff;
  font-weight:700;
}

/* LISTINGS */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:16px;
}

.item img{
  width:100%;
  height:300px;
  object-fit:contain;
  background:#F3F6FB;
  padding:10px;
}

.panel{background:#fff;padding:16px;border-radius:12px}

.section{display:none}
.active{display:block}

.preview{width:100%;max-height:200px;display:none;margin-top:10px}
</style>
</head>

<body>

<header>
<div class="brand">Sports<span>Swap</span></div>
<nav>
<button onclick="show('home')">Shop</button>
<button onclick="show('sell')">Sell</button>
<button onclick="show('account')">Account</button>
</nav>
</header>

<!-- HOME -->
<div id="home" class="section active">
<div class="home">

<div class="search">
<input placeholder="Search for gear...">
</div>

<div class="sports">
<button>Hockey</button>
<button>Baseball</button>
<button>Golf</button>
<button>Basketball</button>
<button>Soccer</button>
</div>

<div class="headline">
<h1>Discover the best deals in sports gear</h1>
<p>Thousands of listings daily from players like you.</p>
</div>

<div class="features">
<div class="card">
<img src="https://images.unsplash.com/photo-1517649763962-0c623066013b">
<div class="overlay">
<h2>Gear up. Save big.</h2>
<button>Shop</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1579952363873-27d3bfad9c0d">
<div class="overlay">
<h2>Turn gear into cash</h2>
<button onclick="show('sell')">Sell</button>
</div>
</div>
</div>

<div class="grid" id="listings"></div>

</div>
</div>

<!-- SELL -->
<div id="sell" class="section">
<div class="panel">

<select id="sport"></select>
<select id="gear"></select>

<input id="title" placeholder="Title">
<input id="price" placeholder="Price">

<textarea id="desc" placeholder="Description"></textarea>

<input type="file" id="img">
<img id="preview" class="preview">

<button onclick="create()">Post</button>

</div>
</div>

<!-- ACCOUNT -->
<div id="account" class="section">
<div class="panel">

<input id="email" placeholder="Email">
<input id="password" placeholder="Password">

<button onclick="signup()">Sign Up</button>
<button onclick="signin()">Sign In</button>

<h3>Profile</h3>

<input id="username" placeholder="Username">
<input type="file" id="pimg">
<img id="ppreview" class="preview">
<textarea id="bio"></textarea>

<button onclick="saveProfile()">Save</button>

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth,createUserWithEmailAndPassword,signInWithEmailAndPassword,onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { getFirestore,collection,addDoc,onSnapshot,doc,setDoc,getDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
import { getStorage,ref,uploadBytes,getDownloadURL } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-storage.js";

const app=initializeApp({
apiKey:"YOUR_KEY",
authDomain:"YOUR_DOMAIN",
projectId:"YOUR_ID",
storageBucket:"YOUR_BUCKET"
});

const auth=getAuth(app);
const db=getFirestore(app);
const storage=getStorage(app);

let user=null;

onAuthStateChanged(auth,u=>{
user=u;
loadProfile();
});

window.show=id=>{
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
};

/* SPORT SYSTEM */
const map={
Hockey:["Stick","Skates","Gloves"],
Baseball:["Bat","Glove"],
Golf:["Clubs","Bag"]
};

const s=document.getElementById('sport');
const g=document.getElementById('gear');

Object.keys(map).forEach(x=>{
let o=document.createElement('option');
o.textContent=x;
s.appendChild(o);
});

s.onchange=()=>{
g.innerHTML="";
map[s.value].forEach(x=>{
let o=document.createElement('option');
o.textContent=x;
g.appendChild(o);
});
};
s.onchange();

/* IMAGE */
img.onchange=e=>{
preview.src=URL.createObjectURL(e.target.files[0]);
preview.style.display="block";
};

/* CREATE */
window.create=async()=>{
let file=img.files[0];
let url="";

if(file){
let r=ref(storage,"img/"+Date.now());
await uploadBytes(r,file);
url=await getDownloadURL(r);
}

await addDoc(collection(db,"listings"),{
title:title.value,
price:price.value,
desc:desc.value,
sport:s.value,
gear:g.value,
image:url
});
};

/* LISTINGS */
onSnapshot(collection(db,"listings"),snap=>{
let html="";
snap.forEach(d=>{
let i=d.data();
html+=`
<div class="panel item">
<img src="${i.image}">
<h3>${i.title}</h3>
<p>${i.sport} • ${i.gear}</p>
<p>$${i.price}</p>
</div>`;
});
listings.innerHTML=html;
});

/* AUTH */
window.signup=()=>createUserWithEmailAndPassword(auth,email.value,password.value);
window.signin=()=>signInWithEmailAndPassword(auth,email.value,password.value);

/* PROFILE */
pimg.onchange=e=>{
ppreview.src=URL.createObjectURL(e.target.files[0]);
ppreview.style.display="block";
};

window.saveProfile=async()=>{
let file=pimg.files[0];
let url="";

if(file){
let r=ref(storage,"profile/"+user.uid);
await uploadBytes(r,file);
url=await getDownloadURL(r);
}

await setDoc(doc(db,"users",user.uid),{
username:username.value,
bio:bio.value,
image:url
});
};

async function loadProfile(){
if(!user)return;
let s=await getDoc(doc(db,"users",user.uid));
if(!s.exists())return;
let d=s.data();
username.value=d.username||"";
bio.value=d.bio||"";
if(d.image){
ppreview.src=d.image;
ppreview.style.display="block";
}
}
</script>

</body>
</html>
