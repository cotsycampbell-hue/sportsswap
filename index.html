<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SportsSwap</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial;background:#F7FAFF;color:#111}

/* HEADER */
header{
background:#fff;
padding:16px 24px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #E3E8F0;
position:sticky;
top:0;
z-index:10;
}
.brand{font-size:24px;font-weight:800}
.brand span{color:#4DA6FF}

nav button{
background:#EEF6FF;
border:1px solid #D7E8FF;
padding:10px 14px;
border-radius:10px;
cursor:pointer;
font-weight:700;
color:#2F80ED;
margin-left:6px;
}

/* HERO */
.hero{
padding:40px 24px;
max-width:1100px;
margin:auto;
}

.market-search{
display:grid;
grid-template-columns:1fr auto;
gap:12px;
background:#fff;
padding:12px;
border-radius:16px;
border:1px solid #E3E8F0;
margin-bottom:20px;
}

.market-search input{
border:none;
outline:none;
font-size:16px;
}

.market-search button{
background:#111;
color:#fff;
border:none;
padding:12px 16px;
border-radius:12px;
}

.sports{
display:flex;
gap:10px;
margin-bottom:20px;
}

.sports button{
padding:10px 14px;
border-radius:999px;
border:1px solid #D7E8FF;
background:#fff;
color:#2F80ED;
font-weight:700;
}

.feature{
display:grid;
grid-template-columns:1fr 1fr;
gap:16px;
margin-bottom:20px;
}

.tile{
position:relative;
border-radius:20px;
overflow:hidden;
}

.tile img{
width:100%;
height:260px;
object-fit:cover;
}

.overlay{
position:absolute;
bottom:20px;
left:20px;
color:#fff;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:16px;
}

.card{
background:#fff;
border-radius:16px;
padding:14px;
border:1px solid #E3E8F0;
}

.card img{
width:100%;
height:240px;
object-fit:contain;
background:#F3F6FB;
}

.btn{
margin-top:10px;
padding:10px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:700;
}

.btn-primary{background:#4DA6FF;color:#fff}

.section{display:none}
.section.active{display:block}

.wrap{max-width:1100px;margin:auto;padding:20px}

</style>
</head>

<body>

<header>
<div class="brand">Sports<span>Swap</span></div>
<nav>
<button onclick="showSection('shop')">Shop</button>
<button onclick="showSection('sell')">Sell</button>
<button onclick="showSection('offers')">Messages</button>
<button onclick="showSection('orders')">Orders</button>
<button onclick="showSection('account')">Account</button>
</nav>
</header>

<!-- HERO -->
<div class="hero">

<div class="market-search">
<input id="search" placeholder="Search gear...">
<button>Search</button>
</div>

<div class="sports">
<button>Hockey</button>
<button>Baseball</button>
<button>Golf</button>
</div>

<div class="feature">
<div class="tile">
<img src="https://images.unsplash.com/photo-1517649763962-0c623066013b">
<div class="overlay">
<h2>Shop Hockey Gear</h2>
</div>
</div>

<div class="tile">
<img src="https://images.unsplash.com/photo-1579952363873-27d3bfad9c0d">
<div class="overlay">
<h2>Sell Your Gear</h2>
</div>
</div>
</div>

</div>

<!-- SHOP -->
<div id="shop" class="wrap section active">
<div class="grid" id="listings"></div>
</div>

<!-- SELL -->
<div id="sell" class="wrap section">
<input id="title" placeholder="Title"><br><br>
<input id="price" placeholder="Price"><br><br>
<input type="file" id="img"><br><br>
<button class="btn btn-primary" onclick="post()">Post Listing</button>
</div>

<!-- MESSAGES -->
<div id="offers" class="wrap section">
<h2>Messaging coming live</h2>
</div>

<!-- ORDERS -->
<div id="orders" class="wrap section">
<h2>Orders system active</h2>
</div>

<!-- ACCOUNT -->
<div id="account" class="wrap section">
<input id="email" placeholder="Email"><br><br>
<input id="pass" placeholder="Password"><br><br>
<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-storage.js";

const app = initializeApp({
apiKey:"AIzaSyAYPsyhHfI2fl0nHGHSX4i1z2e9ZOfDb2I",
authDomain:"sportsswap-32168.firebaseapp.com",
projectId:"sportsswap-32168",
storageBucket:"sportsswap-32168.firebasestorage.app"
});

const db=getFirestore(app);
const auth=getAuth(app);
const storage=getStorage(app);

window.showSection=id=>{
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

window.signup=()=>{
createUserWithEmailAndPassword(auth,email.value,pass.value)
alert("Account created")
}

window.login=()=>{
signInWithEmailAndPassword(auth,email.value,pass.value)
alert("Logged in")
}

window.post=async()=>{
const file=img.files[0];
let url="";
if(file){
const r=ref(storage,"img/"+Date.now());
await uploadBytes(r,file);
url=await getDownloadURL(r);
}
await addDoc(collection(db,"listings"),{
title:title.value,
price:price.value,
image:url
});
alert("Posted")
}

onSnapshot(collection(db,"listings"),snap=>{
let html="";
snap.forEach(d=>{
let i=d.data();
html+=`
<div class="card">
<img src="${i.image}">
<h3>${i.title}</h3>
<p>$${i.price}</p>
</div>`;
});
listings.innerHTML=html;
});

</script>

</body>
</html>
