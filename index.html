<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SportsSwap</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter,Arial;background:#F7FAFF;color:#111}

/* HEADER */
header{
background:#fff;
padding:16px 24px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #E3E8F0;
position:sticky;
top:0;
z-index:10;
}

.brand{font-size:24px;font-weight:900}
.brand span{color:#4DA6FF}

/* NAV */
nav button{
background:#EEF6FF;
border:1px solid #D7E8FF;
padding:10px 14px;
border-radius:10px;
cursor:pointer;
font-weight:700;
color:#2F80ED;
margin-left:6px;
transition:.2s;
}
nav button:hover{background:#4DA6FF;color:#fff}

/* HERO */
.hero{padding:40px 24px;max-width:1100px;margin:auto}

.market-search{
display:grid;
grid-template-columns:1fr auto;
gap:12px;
background:#fff;
padding:14px;
border-radius:16px;
border:1px solid #E3E8F0;
box-shadow:0 10px 25px rgba(0,0,0,.04);
margin-bottom:20px;
}

.market-search input{
border:none;
outline:none;
font-size:16px;
}

.market-search button{
background:#111;
color:#fff;
border:none;
padding:12px 16px;
border-radius:12px;
font-weight:700;
}

.sports{display:flex;gap:10px;margin-bottom:20px}
.sports button{
padding:10px 14px;
border-radius:999px;
border:1px solid #D7E8FF;
background:#fff;
color:#2F80ED;
font-weight:700;
}

.feature{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:30px}

.tile{
position:relative;
border-radius:20px;
overflow:hidden;
box-shadow:0 20px 40px rgba(0,0,0,.08);
}

.tile img{
width:100%;
height:260px;
object-fit:cover;
}

.overlay{
position:absolute;
bottom:20px;
left:20px;
color:#fff;
font-weight:800;
font-size:22px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
}

.card{
background:#fff;
border-radius:18px;
overflow:hidden;
border:1px solid #E3E8F0;
box-shadow:0 12px 28px rgba(0,0,0,.06);
transition:.25s;
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 20px 40px rgba(0,0,0,.1);
}

.card img{
width:100%;
height:260px;
object-fit:contain;
background:#F3F6FB;
padding:20px;
}

.card-body{padding:16px}

.price{
font-size:20px;
font-weight:800;
margin-top:6px;
}

.btn{
margin-top:10px;
padding:10px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:700;
width:100%;
}

.btn-primary{
background:#4DA6FF;
color:#fff;
}

.section{display:none}
.section.active{display:block}
.wrap{max-width:1100px;margin:auto;padding:20px}
</style>
</head>

<body>

<header>
<div class="brand">Sports<span>Swap</span></div>
<nav>
<button onclick="showSection('shop')">Shop</button>
<button onclick="showSection('sell')">Sell</button>
<button onclick="showSection('account')">Account</button>
</nav>
</header>

<!-- HERO -->
<div class="hero">

<div class="market-search">
<input id="search" placeholder="Search sticks, skates, gloves...">
<button>Search</button>
</div>

<div class="sports">
<button>Hockey</button>
<button>Baseball</button>
<button>Golf</button>
<button>Basketball</button>
</div>

<div class="feature">
<div class="tile">
<img src="https://images.unsplash.com/photo-1517649763962-0c623066013b">
<div class="overlay">Shop Hockey Deals</div>
</div>

<div class="tile">
<img src="https://images.unsplash.com/photo-1579952363873-27d3bfad9c0d">
<div class="overlay">Sell Your Gear</div>
</div>
</div>

</div>

<!-- SHOP -->
<div id="shop" class="wrap section active">
<div class="grid" id="listings"></div>
</div>

<!-- SELL -->
<div id="sell" class="wrap section">
<input id="title" placeholder="Title"><br><br>
<input id="price" placeholder="Price"><br><br>
<input type="file" id="img"><br><br>
<button class="btn btn-primary" onclick="post()">Post Listing</button>
</div>

<!-- ACCOUNT -->
<div id="account" class="wrap section">
<input id="email" placeholder="Email"><br><br>
<input id="pass" placeholder="Password"><br><br>
<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-storage.js";

const app = initializeApp({
apiKey:"AIzaSyAYPsyhHfI2fl0nHGHSX4i1z2e9ZOfDb2I",
authDomain:"sportsswap-32168.firebaseapp.com",
projectId:"sportsswap-32168",
storageBucket:"sportsswap-32168.firebasestorage.app"
});

const db=getFirestore(app);
const auth=getAuth(app);
const storage=getStorage(app);

window.showSection=id=>{
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

window.signup=()=>createUserWithEmailAndPassword(auth,email.value,pass.value)
window.login=()=>signInWithEmailAndPassword(auth,email.value,pass.value)

window.post=async()=>{
const file=img.files[0];
let url="";
if(file){
const r=ref(storage,"img/"+Date.now());
await uploadBytes(r,file);
url=await getDownloadURL(r);
}
await addDoc(collection(db,"listings"),{
title:title.value,
price:price.value,
image:url
});
alert("Posted")
}

onSnapshot(collection(db,"listings"),snap=>{
let html="";
snap.forEach(d=>{
let i=d.data();
html+=`
<div class="card">
<img src="${i.image}">
<div class="card-body">
<h3>${i.title}</h3>
<div class="price">$${i.price}</div>
<button class="btn btn-primary">Make Offer</button>
</div>
</div>`;
});
listings.innerHTML=html;
});

</script>

</body>
</html>
