<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAYPsyhHfI2fl0nHGHSX4i1z2e9ZOfDb2I",
  authDomain: "sportsswap-32168.firebaseapp.com",
  projectId: "sportsswap-32168",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

window.signUp = async () => {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  await createUserWithEmailAndPassword(auth, email, password);
  alert("Account created");
};

window.signIn = async () => {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  await signInWithEmailAndPassword(auth, email, password);
  alert("Signed in");
};

window.postListing = async () => {
  const title = document.getElementById("title").value;
  await addDoc(collection(db, "listings"), { title });
  alert("Listing posted");
};

onSnapshot(collection(db, "listings"), (snapshot) => {
  const list = document.getElementById("listings");
  list.innerHTML = "";
  snapshot.forEach(doc => {
    const div = document.createElement("div");
    div.innerText = doc.data().title;
    list.appendChild(div);
  });
});
</script>

<h1>SportsSwap Beta</h1>

<input id="email" placeholder="email"><br>
<input id="password" placeholder="password" type="password"><br>

<button onclick="signUp()">Sign Up</button>
<button onclick="signIn()">Sign In</button>

<hr>

<input id="title" placeholder="Listing title">
<button onclick="postListing()">Post Listing</button>

<div id="listings"></div>
